front:
  text: 東林十八高賢傳序往余令鍾陵曾過東林寺虎谿橋上遠公社竟作牛馬走騷驛之場為之慨然去今十餘年乃得東林十八高賢傳讀之諸公皆糞壤富貴膏肓泉石心超淨穢之區境際人天之勝令人脉脉心動摳從亡階況親承接引妙契因依豈必入淨土而極樂上蓮座而興瞻哉此傅刻在廬山未獲流布樂愚上人謀新業于棲賢山中尋授吳門毗耶室梓行予故喜而序之使信奉此傳人人見遠師人人會廬山也余謂上人尚宜索龍眠十八賢圖附之以傳千載何羨蘭亭輞川哉昔宗少文對衡陽王有言祿如秋草時過即腐試問學道人此片白蓮花有腐敗不不也武林寓生黃汝亨書東林十八高賢傳目次序慧遠法師慧永法師慧持法師道生法師曇順法師僧叡法師曇恒法師道昞法師曇詵法師道敬法師佛䭾耶舍尊者佛䭾䟦陀羅尊者劉程之張野周續之張詮宗炳雷次宗百二十三人傳不入社諸賢傳䟦
