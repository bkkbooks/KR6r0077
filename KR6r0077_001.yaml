body:
  text: 慧遠法師法師慧遠姓賈氏鴈門樓煩人幼而好學年十三隨舅令狐氏遊學許洛博綜六經尤善莊老宿儒先進莫不服其深致二十一欲度江從學范寧適石虎暴死南路梗塞有志不遂時沙門釋道安建剎於太行常山一面盡敬以為真吾師也初聞安師講般若經豁然開悟歎曰九流異議皆糠粃耳遂與母弟慧持投簪受業精思諷誦以夜繼晝因求直道場沙門曇翼每給燈燭之費安師聞之曰道士誠知人師神明英越志與理冥至二十四大善講貫有客聞說實相義往復問難彌增疑昧師為引莊子之說以相比類惑者釋然安師因許令不廢外典常臨衆歎曰使道流東國者其在遠乎後隨安師南遊襄陽值秦將符丕為寇乃分張徒屬各隨所往耆德臨岐皆蒙誨益唯師不聞一言即跪請曰獨無訓敕懼非人類安師曰如汝者復何所慮師乃與弟子數十人南適荊州居上明寺念舊與同門慧永約結屋於羅浮太元六年晉孝武帝至尋陽見廬山間曠可以息心乃立精舍以去水猶遠舉杖扣地曰若此可居當使朽壤抽泉言畢清流涌出尋陽亢旱師詣池側讀海龍王經忽見神蛇從池而出須臾大雨歲竟有秋因名龍泉精舍永師先居廬山西林欲邀同止而師學侶𥨊衆永乃謂刺史桓伊曰遠公方富弘道而貧道所棲隘不可處時師夢山神告曰此山足可棲神願毋它往其夕大雨雷震詰旦林麓廣闢素沙布地楩柟文梓充布地上不知所自至伊大敬感乃為建剎名其殿曰神運以在永師舍東故號東林時大元十一年也此山儀形九疊峻聳天絶而所居盡林壑之美背負爐峯旁帶瀑布清流環階白雲生棟廬山記裕先生殷周之際受道於仙人即岩成館人稱神仙之廬因名廬山尋陽記山高三千三百六十丈周二百五十里其山九疊水亦九派郡國志疊障九層包藏仙跡別營禪室最居靜深凡在瞻履神清氣肅師聞天竺佛影是佛昔化毒龍瑞迹欣感于懷後因邪舍律士敘述光相乃背山臨流營築龕室淡釆圖寫望如煙霧復製五銘刻于石江州太守孟懷玉別駕王喬之常侍張野晉安太守殷隱黃門毛修之主簿殷蔚參軍王穆夜孝廉范悅之隱士宗炳等咸賦銘贊見廬山集先是尋陽陶侃刺廣州漁人見海中有神光網之得金像文殊志云阿育王所造後商人於海東獲一圓光持以就像若彌縫然侃以送武昌寒溪主僧僧珍常往夏口夜夢寺火而此像室獨有神護馳還寺果焚像室果存及侃督江州迎像將還至舟而溺荊楚為之謠曰陶惟劒雄像以神標雲翔泥宿邈何遙遙可以誠至難以力招及寺成師至江上䖍禱之像忽浮出遂迎至神運殿造重閣以奉之因製文殊瑞像讚嘗謂諸教三昧其名甚衆功高易進念佛為先既而謹律息心之士絶塵清信之賓不期而至者慧永同師安公先居西林慧持遠師同母弟道生曇順並羅什門弟僧睿曇恆道昺曇詵道敬並遠師門人佛䭾邪舍此云覺明罽賓國人佛䭾跋陀羅此六覺賢迦維衛國人名儒劉程之號遺民張野周續之張詮宗炳雷次宗等結社念佛世號十八賢復率衆至百二十三人同修淨土之業造西方三聖像建齊立誓令劉遺民著發願文而王喬之等復為念佛三昧詩以見志師神貌嚴肅瞻仰者則心戰沙門有持如意致獻者不敢陳白竊留座隅而去法師慧義強正少可謂師弟子慧寶曰諸君膚淺故於遠公望風推服常至山值師講法華欲致難輒內悸流汗出謂慧寶曰此公言貌誠可敬服殷仲堪任荊州入山展敬與師俱臨北㵎松下共談易道終日忘倦仲堪歎曰師智識深明實難庶幾師亦曰君之才辨如此流泉後人名其處曰聰明泉司徒王謐護軍王默並欽慕風德遙致敬禮王謐有書往反盧循據江州入山詣師師少與循父嘏同為書生及見循歡然道舊其徒諫曰循為國寇得不為人疑師曰我佛法中情無取舍識者自能察之此何足懼及宋武進討循設帳桑尾左右曰遠公素王廬山與循交厚宋武曰遠公世表之人何可疑也乃遣使馳書遺以錢帛有行者來侍師善驅蛇蛇為盡去因號辟蛇行者有一虎往來時見行迹未嘗傷人人號遊山虎師與社衆每遊憩上方峯頂患去水遠它日有虎跑其石水為之出因號虎跑泉又於一峰製涅槃疏因名擲筆峯初是大教流行江東經卷未備禪法無聞律藏多𨷂師乃命弟子法淨法領等遠越葱嶺曠歲來還皆獲梵本昔安公在關中請曇摩難提出阿毗曇心論其人未善晉言頗多疑滯後僧伽提婆至即請重譯及三法度論於是二論乃興師即製序以貽學者聞鳩摩羅什入關遣書通好什答書曰傳繹來貺粗聞風德經言末代東方有護法菩薩欽哉仁者善弘其道曇摩流支入秦師遣弟子曇雍請於關中出十誦律流傳晉國西土諸僧咸稱漢地有大乘開士每東向致禮獻心盧嶽及佛䭾跋陀羅至師即請出禪數諸經於是禪戒典出自廬山幾至百卷先是此土未有泥洹常住之說但言壽命長遠師曰佛是至極至極則無變無變之理豈有窮耶乃著法性論十四篇羅什見而歎曰邊方未見經便暗與理合秦主欽風以大智度論新譯致書求序師以其文繁廣乃抄其要為二十卷而為之序羅什譯智論凡百卷桓玄征殷仲堪要師出虎溪稱疾不往玄將入山左右曰昔殷仲堪禮敬於遠請公勿屈玄曰仲堪死人耳及玄見師不覺屈膝所懷問難不復敢發及語至征討師即不答玄後以震主之威勸令登仕師正辭以答玄不能強既而欲沙汰衆僧下教僚屬曰沙門之徒有能申述經誥禁行修整者始可以宣寄大化其有違於此者悉當罷黜唯廬山道德所居不在搜簡之列師因致書廣立條制玄悉從之初庚氷輔政以沙門應敬王者何充奏不應禮及玄在姑熟復申氷議師答書曰袈裟非朝宗之服鉢盂非廊廟之器塵外之客不應致敬王者乃著沙門不敬王者論五篇一明在家者有天屬之愛奉主之禮二明出家以求志變俗以達道豈得與世典同其禮敬三明求宗不順化宗謂泥洹不變以化盡為宅泥洹即涅槃翻不生不滅不順化者其生可滅其神可冥冥神絶境謂之泥洹而不隨順於生生化化流動無窮之境斯所以不事王侯高尚其事豈復有所禮敬者哉四明體極不兼應謂歷代君王體極之主但務方內而不可並御于方外故曰不兼應天地之道功盡于運化帝主之德理極于順通與夫獨絶之教不變之宗優劣明矣若夫如來之道則無所不應矣五明形盡神不滅謂火之傳于薪猶神之傳于形火之傳異薪猶神之傳異形方生方死往來無窮但悟徹者反本惑理者逐物耳有頃玄篡位即下書曰佛法宏誕所未能了初推奉主之情故令興敬今事既在己宜盡謙光諸道人勿復致禮也桓玄西奔安帝自江陵還京師輔國何無忌勸師侯迎師稱疾不行帝遣使勞問師上書謝病帝復下詔慰答師嘗講喪服經當是禮記小記大記四制等篇雷次宗宗炳等並執卷承旨次宗後著義疏首稱雷氏宗炳寄書責之曰昔與足下面受于釋和尚今便稱雷氏耶陸德明毛詩音義云周續之與雷次宗同受詩義于遠法師亦此類也釋惠要患山中無刻漏乃與水上立十二葉芙蓉因波隨轉分定晝夜以為行道之節謂之蓮花漏僧徹善篇牘嘗至山南攀松而嘯和風遠集衆鳥悲鳴超然有自得之趣退咨于師曰律禁管絃歌舞若一吟一笑可得為乎師曰苟以亂意皆為非法徹唯而止師居山三十年迹不入俗唯以淨土克勤于念初十一年澄心繫想三覩聖相沉厚不言後十九年七月晦夕於般若臺之東龕方從定起見阿彌陀佛身滿虗空圓光之中有諸化佛觀音勢至左右侍立又見水流光明分十四支流注上下演說苦空無常無我之音佛告之曰我以本願力故來安慰汝汝後七日當生我國又見佛䭾邪舍慧持義熙八年先逝慧永義熙十年先逝劉遺民義熙六年先逝在佛之側前揖師曰師志在先何來之晚師語法淨惠寶曰吾始居此十一年中三見佛相今復見之吾生淨土必矣又曰七日之期斯為漸矣即𥨊疾製遺誡曰吾昔以知命之年託業此山自審有必盡之期便欲絶迹外緣以求其志良由性弱於斷遂令同趣相引時賢過眷情以類感不覺形與運頽今年已八十三矣仰尋違離之誨俯慨自負之心徒令此生虗謝以悼往疾之深今于至時露骸松林之下即嶺為墳無土木同狀此乃古人之禮汝等勿違苟神理不昧庶達其誠大哀世尊亦當祐之以道門徒號慟若喪父母師以世情難割乃制七日展哀至期始順寂即義熙十二年八月六日也弟子不忍露尸與尋陽太守阮侃奉全軀舉葬于西嶺纍石為塔謝靈運立以銘遺德張野作序自稱門人宗炳復立於寺門以表德業師將終耆德請以豉酒治病師曰律無通文請飲米汁師曰日過中矣又請食蜜和水乃令披律尋文卷未半而終所著經論諸序銘贊詩記凡十卷號廬山集刻梓在越府自佛圖澄道安師遠法師曇順僧睿五世為國師云唐宣宗大中二年追諡辨覺大師升元三年追諡正覺南唐李先主年號即晉高祖皇帝天福四年也大宋太宗太平興國三年追諡圓悟大師凝寂之塔慧永法師西林法師慧永河內潘氏年十二出家事沙門竺曇現初習禪於恆山與遠師同依安法師期結宇羅浮及遠師為安公所留師乃欲先度五嶺太元初至尋陽刺史陶範素挹道風乃留憩廬山舍宅為西林以奉師布衣蔬食精心克己容嘗含笑語不傷物峯頂別立茅室持往禪思至其室者常聞異香因號香谷一虎同居人至輒驅去遠師來之龍泉桓伊為立東林三十年影不出山師居西林亦如之嘗因法事至近邑還山薄暮烏橋營主醉騎馬當道遮師不聽去師以杖指馬馬驚走營主仆地師捧慰之遂還營主病往寺誨罪師曰非貧道意為禱之尋愈鎮南將軍何無忌鎮尋陽至虎溪請遠公及師遠公持名望從徒百餘高言華論舉止可觀師衲衣半脛荷錫捉鉢松下飄然而至無忌謂衆曰永公清散之風乃多於遠師也師標誠植願動在安養義熙十年在疾忽斂衣求屣欲起衆驚問師曰佛來也言終而化異香七日方歇葬于寺之西南春秋八十三唐玄宗朝詔重建塔亭追諡覺寂大師實智之塔慧持法師法師慧持遠公同母弟也幼讀書一日所記常敵十日年十八與兄同事安公遍學衆經遊刃三藏及安公在襄陽遣遠公與師東下遂止廬山師形長八尺衲衣垂膝徒屬三百師為上首豫章太守范寧請師講法華經阿毗曇論四方雲聚琅邪王珣與范寧書問遠持二公孰愈寧曰誠謂賢兄賢弟珣復書曰但令如弟誠未之有況復賢邪羅什在關中遙相欽敬每致書通好隆安三年辭兄入蜀遠公留之曰人生愛聚汝獨樂離師曰滯情愛聚者本不應出家今既割欲求道正以西方為期耳即悵然而別至成都𮠁縣居龍淵寺大弘佛法升其堂者號登龍門義熙八年順寂春秋七十六臨終遺命務嚴律儀專心淨業以東間經籍付道泓西間法典付曇蘭以泓行業清敏蘭神悟天發並能係軌師蹤焉道生法師法師道生魏氏巨鹿人幼從竺法汰出家披對經誥一覽能誦年在志學便登講座吐納明辨雖宿望莫敢酬抗初依盧山常以入道之要慧解為本乃與僧睿慧嚴慧觀等遊學長安從羅什受業關中僧徒咸仰神悟嘗喟然歎曰自經典東流譯人重阻多滯權文鮮通圓義若忘筌得魚始可與言道矣於是校閲真俗精練空有研思因果乃立善不受報及頓悟成佛義又著二諦論佛性常有論佛無淨土論應有緣論並籠舊說妙有淵旨守文之徒嫌嫉競起師又以法顯三藏所翻泥洹經本先至六卷成文經云除一闡提皆有佛性師云夫稟質二儀皆有涅槃正因闡提含生之類何得獨無佛性蓋是經來未盡耳乃唱闡提之人皆得成佛時大本未傳孤明先發舊學僧黨以為背經遂顯大衆擯而遣之師正容誓之曰若我所說背經當見身癘疾若與實相不背願舍壽之日踞師子座遂拂衣而行及後大經至聖行品云一闡提人雖復斷善猶有佛性於是諸師皆為愧服師被擯南還入虎丘山聚石為徒講涅槃經至闡提處則說有佛性且曰如我所說契佛心否群石皆為點頭旬日學衆雲集忽雷震青園佛殿有龍升天因改寺曰龍光師於寺請罽賓律師譯沙彌塞律傳于世既而辭衆復投廬山預蓮社久之還都止青霞寺宋文帝大會沙門親御地筵食至良久衆疑過中帝曰始可中耳生乃曰白日麗天天言始中何得非中遂舉箸而食一衆從之莫不嘆其機辨時王弘范泰顏延之並挹敬風猷相從問道元嘉十一年十一月庚子于廬山升座說法將畢衆見麈尾紛然墜地隱几而化宛若入定諸師聞之益信前誓有證翌日葬于廬山之西阜初關中僧肇始注維摩詰經世咸玩味師乃更發深旨人服其妙所述維摩詰法華泥洹小品諸經皆有義疏時以師能推闡提得佛之義于是顯其頓悟不受報等論曇順法師法師曇順黃龍人幼出家承訓羅什講釋群經妙盡色空無著之旨什歎曰此子奇器也後來廬山同修淨業寧蠻校尉劉遵孝於江陵立寺要師經始盛弘念佛三昧之道宋元嘉二年別衆坐逝異香滿室春秋七十九僧睿法師法師僧睿冀州人遊學諸方嘗行經蜀西界為人所掠使牧羊有商客異之疑是沙門及問以經義無不綜達即出金贖之後遊歷天竺諸國還至關中從羅什咨稟經義羅什翻法華經以竺法護本云天見人人見天什曰以此言過質耳睿曰將非人天交接兩得相見什喜遂用其文久之來入廬山依遠公修淨業既而適京師止烏衣寺講說衆經聽者推服宋彭城王義康要入第受戒師曰禮聞來學王乃入寺祗奉戒法王以貂裘奉師常用敷坐王蜜以錢三萬買之師曰此雖非所宜服然王之所施不可棄也王聞益加敬謝靈運篤好佛理殊方俗音多所通解嘗以經中字音求證於師因為著十四音訓梵漢昭然元嘉十六年無疾告衆曰吾將行矣即面西合掌而亡衆見臥內一金蓮花倐爾而隱春秋八十五曇恆法師法師曇恆河東人童孺依遠公出家年甫十三便能講說內外典籍無不通貫德行清孤物情推服常有群鹿馴繞座隅自入廬山專志淨業義熙十四年端坐合掌厲聲念佛而化春秋七十二道昞法師法師道昞頴川人陳氏幼出家為遠公弟子該通經律兼明莊老志節孤峻言與行合念佛三昧究心無間義熙十四年豫章太守王䖍入山謁敬請為山中主用紹遠公之席衆以道源法嗣咸知宗仰元嘉十二年集衆念佛就座而化春秋七十一曇詵法師法師曇詵廣陵人幼從遠公出家勤修淨業兼菩講說注維摩經行于世常著窮通論以明宿修述蓮社録以記往生又能別識鳥獸毛色俊鈍之性洞曉草木枝幹甘苦之味妙盡其理人知其有密證云元嘉十七年集衆謂曰自建寺以來至此五十年吾之西行最在其後即跏趺念佛百聲閉息遂絶春秋八十道敬法師法師道敬琅邪王氏祖凝之刺江州遂從遠公出家年十七博通經論日記萬言每歎戒律終日難全願淨六根但稟一戒以為得度之要遠公知其堅正許之篤志念佛蚤夜弗替遠公歸寂乃入若邪山宋永初元年謂衆曰先師見命吾其行矣即端坐唱佛而化衆見光明滿室彌時方滅春秋五十二佛䭾邪舍尊者尊者佛䭾邪舍晉云覺明罽賓國婆羅門種有沙門至其家乞食父本外道怒歐之遂手足攣躄巫師謂曰坐犯賢聖即請此沙門悔過旬日乃瘳因令邪舍出家時年十三隨師行曠野與虎遇邪舍曰虎已飽必不傷人前行中道果見餘骸年十五誦經日至萬言以分衛廢業為憂梵語分衛晉言乞食一羅漢來代乞食年十九誦經滿數百萬言性度簡傲不為諸人重至三十猶為沙彌復從舅氏學五明論世間法術內衆外道皆有五明內五明者一聲明二醫方明三呪術明四工巧明五因明外五明者前四并同后一是符印明至沙勒國待遇隆厚既而羅什至乃從學阿毗曇論十誦律什隨母反龜茲師遂留止行化符堅遣呂光伐龜茲執羅什師聞歡曰我與羅什未盡懷抱今忽羈虜相見何期後十年師東至龜茲盛弘法化羅什在姑臧遣信要之師恐國人止其行取清水以藥投之呪數十言與弟子洗足即夜便發比旦行數百里追之不及問弟子何所覺耶答曰唯聞疾風流韾兩目有淚師又呪水洗足乃止既達姑臧什已入長安聞姚主逼以妾媵歎曰羅什如好綿纊何可使入棘林羅什勸姚主遣使迎師既至別立省寺于逍遙園四事供養一無所受時至分衛一食而已時羅什譯出十住經師更相徵決辭理方定師髭赤善解毗婆沙論時人號赤髭論主秦弘始中譯出四分律四十四卷長阿含經二十二卷義熙八年來廬山入社後辭還本國自罽賓以虗空藏經一卷寄商客至涼州佛䭾跋陀羅尊者尊者佛䭾跋陀羅晉云覺賢姓釋迦迦維羅衛國人甘露飯王苗末也幼亡父母出家為沙彌年十六博學羣經深達禪律嘗與僧伽達多共遊罽賓達多閉戶禪坐忽見師來云暫往兜率致敬彌勒言訖便隱后益見其神變敬心祈問方知得不還果時姚秦沙門智嚴至罽賓覩法衆清淨慨然東顧曰我諸同輩未遇真匠將何發悟即咨詢于衆孰能遂我祈請流化東土僉應之曰跋陀羅其人也嚴乃要師裹糧而行經歷諸國至交址附舶循海達于青州東萊聞鳩摩羅什在長安即往從之秦太子泓請師于東宮集衆說法與羅什論色空義師曰汝祗說得果中色空不說得因中色空什問何謂師曰一微空故衆微空衆微空故一微空一微空中無衆微衆微空中無一微往復數番羅什罔測秦主興供僧三千盛修人事而師禪靜自守忽謂弟子曰吾見本國五舶俱發衆謂妄言因共擯棄乃與弟子慧嚴慧觀四十餘人俱發至廬山香谷舍而居蒲曷切草舍時會蓮社遠公謂師被擯過由門人縣記五舶于律無犯即遣弟子曇雍致書秦主為其解擯乃請師東林譯出禪數諸經自是江東始耽禪悅師志在遊化西適江陵持鉢分衛果見天竺五舶至此後還都立道場寺先是支法領於于闐得華嚴梵本三萬六千偈未經宣譯義熙十四年吳郡內史孟顗右衛將軍褚叔度請師為主譯與沙門法業慧義惠嚴慧觀等為筆授譯成六十卷有二青衣且從池出灑掃研墨師先後譯出觀佛三昧經般泥洹經修行方便論及法顯所得大僧祗律凡十五部宋元嘉六年念佛而化塔于廬山北嶺劉程之劉程之字仲思彭城人漢楚元王之後妙善老莊旁通百氏少孤事母以孝聞自負其才不預時俗初解褐為府參軍謝安劉裕嘉其賢相推薦皆力辭性好佛理乃之廬山傾心白託遠公曰官祿巍巍欲何不為答曰君臣相疑吾何為之劉裕以其不屈乃旌其號曰遺民及雷次宗周續之宗炳張詮畢頴之等同來廬山遠公謂曰諸君之來豈宜忘淨土之遊乎程之乃鑱石為誓文以志其事文見廬山集遂于西林㵎北別立禪坊養志安貧精研玄理兼持禁戒宗張等咸歎仰之嘗貽書關中與什肇揚榷經義著念佛三昧詩以見專念坐禪之意始涉半載即于定中見佛光照地皆作金色居十五年于正念佛中見阿彌陀佛玉毫光照垂手慰接程之曰安得如來為我摩頂覆我以衣俄而佛為摩頂引袈裟以披之它日念佛又見入七寶池蓮青白其水湛湛有人頂有圓光胸出卍字卍字音萬是佛具萬德之相指池水曰八功德水汝可飲之程之飲水甘美及窹猶覺異香發于毛孔乃自慰曰吾淨土之緣至矣復請僧轉法華經近數百遍后時廬阜諸僧畢集程之對像焚香再拜而祝曰我以釋迦遺教故知有阿彌陀佛此香先當供養釋迦牟尼如來次供養阿彌陀佛復次供養妙法華經所以得生淨土由此經功德願令一切有情俱生淨土即與衆別臥床上面西合手氣絶敕子壅積土為墳勿用棺槨時義熙六年也春秋五十九廬山集載感應事迹甚詳張野張野字萊民居尋陽紫桑與淵明有婚姻契野學兼華梵尤善屬文性孝友田宅悉推與弟一味之甘與九族共州舉秀才南中郎府功曹州治中徵拜散騎常侍俱不就入廬山依遠公與劉雷同尚淨業及遠公卒謝靈運為銘野為序首稱門人世服其義義熙十四年與家人別入室端坐而逝春秋六十九周續之周續之字道祖鴈門人父歿過江因居豫章八歲喪母哀戚過于成人十二詣范寧受業通五經五緯時號十經童子養志閒居窮研老易公卿交辟無所就入廬山事遠公預蓮社以為身不可遺餘纍宜絶遂終身不娶布衣蔬食劉毅鎮姑熟命為撫軍復辟太學博士俱不就以稽康高士傳得出處之正為之注譯宋武帝北伐太子居守迎館安樂寺入講禮月餘復還山江州太守劉柳薦于武帝辟太尉掾不就武帝踐祚召至都間館東郭外乘輿行幸問禮經慠不可長與我九齡射于矍圃三義辨析精異上甚說或問身為處士時踐王庭何也答曰心馳魏闕者以江湖為桎梏情致兩忘者市朝亦岩穴耳時號通隱先生續之素患風痺不復堪講乃移病鍾山景平元年卒春秋六十七張詮張詮字秀碩野之族子也尚情高逸酷嗜典墳雖耕鋤猶帶經不釋朝廷徵為散騎常侍不起庾悅以其貧起為尋陽令笑曰古人以容膝為安若屈志就祿何足為榮乃入廬山依遠公研窮釋典深有悟入宋景平元年無疾西向念佛安臥而卒春秋六十五宗炳宗炳字少文南陽人其母聰辨富于學識教授諸子皆有成炳妙善琴書尤精玄理殷仲堪桓玄並以主簿辟皆不就劉裕領荊州復辟為主簿答曰棲丘飲谷三十年矣乃入廬山築室依遠公蓮社久之兄臧為南平守逼與俱還江陵閒居絶俗劉裕辟太尉掾不就二兄卒纍甚衆頗營稼穡武帝敕南郡長時至餼賚衡陽王義季在荊州親至其室炳角巾布衣引見不拜王曰處先生以重祿可乎對曰祿如秋草時過即腐宋受禪徵為太子舍人元嘉初徵為通直郎太子建徵為中庶子並不應妻羅氏亦有高志羅氏歿炳哀之過甚既而悲情頓釋謂沙門慧堅曰死生之分未易可達三復至教方能遣哀雅好山水往必忘歸西涉荊巫南登衡嶽因結宇山中懷尚平之志以疾還江陵歎曰老病俱至名山不可再登唯澄懷觀道臥以遊之凡所遊履悉圖之于室謂人曰撫琴動操欲令衆山皆響宋元嘉二十四年卒春秋六十九雷次宗雷次宗字仲倫豫章南昌人博學明詩禮入廬山預蓮社立館東林之東元嘉十五年召至京師立學館雞籠山置生徒百員除給事中不拜久之還南昌公卿徂道以送與子姪書曰吾童稚之年已懷遠略弱冠託廬山事釋和尚遊道餐風二十餘載淵匠既傾復與汝曹歸耕先壟山居谷飲忽復十年及今未老尚可勵志成西歸之津梁自今以往家務大小一勿見關二十五年召拜散騎常侍不就復徵詣京師築室鍾山謂之招隱館每自華林園入延賢堂為太子諸王講禮經是年無疾而卒春秋六十三子肅之頗傅素業官至豫章郡丞十八賢傳始不著作者名疑自昔出于廬山耳熙寧間嘉禾賢良陳令舉舜俞粗加刊正大觀初沙門懷悟以事迹疏略復為詳補今歷考廬山集高僧傳及晉宋史依悟本再為補治一事不遺自茲可為定本矣百二十三人傳曇翼餘杭人初入廬山依遠公後往關中見羅什東還會稽入秦望山誦法華經十二年感普賢大士化女子身披采服㩗筠籠一白豕大蒜兩根至師前曰妾入山采薇上采服五采也彩俗下采薇采取也作採俗日已斜豺狼縱橫歸無生理敢托一宿師却之力女復哀鳴不已遂令居草床上夜半號呼腹疼告師按摩師辭以持戒不應手觸女號呼愈甚師乃以布裹錫杖遙為按之翌日女以采服化祥雲豕變白象蒜化雙蓮凌空而上謂師曰我普賢菩薩特來相試郡太守孟顗聞于朝勑建法等寺今天衣寺初餘杭山沙門法志常誦法華有雉巢于菴側翔集座隅若聽受狀如是七年一日忽燋悴志曰汝能聽經必生人道明旦雉殞即為瘞之夜夢童子拜曰因聽經得脫羽類今生山前王氏後其家設齊志方踵門兒曰我和尚來也志撫之曰汝我雉兒也解衣視掖下有雉毳三莖七歲令入山出家十六落髮以掖有毳因名以翼曇雍楊氏關中人形長八尺雄武過人南來廬山依師遠公內外典籍無不綜習立茅屋于山西以自居止有弟子曇果澄思禪門一夕夢山神求受戒法果曰家師在此可往求之雍忽見一人著夾衣風神端雅從者三十人乞授戒師以果先夢知是山神乃為說法授五戒畢神以外國二鋤為嚫禮謝而去師後往荊州行化卒于竹林寺僧濟入廬山問道精悟深要遠公歎曰紹隆大法其在汝乎及在疾遠公以燭遺之曰汝可馮此建心安養師執燭停想延僧誦淨土經至五更以燭授弟子元弼隨僧行道頃之覺自秉一燭浮空而行見阿彌陀佛接至于掌遍事諸佛須臾而覺喜曰吾以一夕觀念便蒙接引明日復于空中見佛菩薩謂弼曰佛來也即舉首西顧一息而終時方炎歊體三日不變異香郁然慧恭豫章豐城人與僧光慧堪慧蘭同志為學光等學力不逮恭而于淨土繫想則過之蘭謂恭曰君雖力學博聞豈不知經云如聾奏音樂悅彼不自聞恭曰學不可已孰能未死昧昧如癡哉後七年蘭等先逝去時並有奇應又五年恭病且篤曰大道沿洄何時可止死生去來吾何歸哉于是叩頭雨泣誓心安養念不少間忽見無量壽佛以金臺前迎恭乘其上見蘭等于臺上光明中而告之曰長老受生已居上品五等不勝慰喜但恨五濁淹延相依之晚耳恭于是日告衆欣然奮迅而滅義熙十一年也廬山集有恭道人臨終感應事法安初依遠公為弟子妙善講說兼習禪業律身持戒為行尤精義熙中新陽邑社有暴虎居神廟樹下前後害民以百數安遊其村居民皆早閉門乃之樹下禪坐須臾虎負人至見安驚喜跳伏安乃為說法授戒有頃而去明旦居民見安謂是神人相率禮敬因改神廟立寺宇請安居之左右田園並舍為寺業常欲畫像須銅青慮不可致忽夢一人跪床前云此下有銅鐘窹即掘之果得二鐘取青成像而以銅助遠公鑄佛後不知所終𨷂公則入廬山白蓮社既逝有同社人至洛陽白馬寺夜中為公則修忌祭忽一時林木殿宇皆作金色空中有聲曰我是闕公則祈生極樂國今已得生矣言訖無所見陸修靜吳興人蚤為道士置館廬山時遠法師居東林其處流泉匝寺下入于溪每送客過此輒有虎號鳴因名虎溪後送客未嘗過獨陶淵明與修靜至語道契合不覺過溪因相與大笑世傳為三笑圖宋泰始三年羽化于京師賜諡簡寂以故居為觀雲笈七籤本傳云元徽五年化不入社諸賢傳陶潛字淵明一字元亮晉大司馬侃之曾孫少懷高尚著五柳先生傳以自況時人以為實録初為建威參軍謂親朋曰聊欲絃歌為三徑之資執事者聞之以為彭澤令郡遣督郵至縣吏白應束帶見之潛歎曰吾不能為五斗米折腰拳拳事鄉里小人耶解印去縣乃賦歸去來及宋受禪自以晉世宰輔之後恥復屈身異代居尋陽柴桑與周續之劉遺民並不應辟命世號尋陽三隱嘗言夏月虗閒高臥北之下清風颯至自謂羲皇上人性不解音畜素琴一張絃徽不具每朋酒之會則撫而和之曰但識琴中趣何勞絃上聲嘗往來廬山使一門生二兒舁籃輿以行時遠法師與諸賢結蓮社以書招淵明淵明曰若許飲則往許之遂造焉忽攢眉而去宋元嘉四年卒世號靖節先生謝靈運祖玄有功晉室靈運為康樂公主孫襲封康樂公文章為江左第一應為江右指金陵也嘗著木屐上山則去前齒下山則去後齒尋山陟嶺必造幽峻至廬山一見遠公肅然心伏乃即寺築臺翻涅槃經鑿池植白蓮時遠公諸賢同修淨土之業因號白蓮社或云為東西二地靈運嘗求入社遠公以其心雜而止之范寧字武子篤學多所通覽時浮虗相煽儒雅日替寧以其源始于王弼何晏二人之罪深于桀紂乃著論非之纍遷中書侍郎朝廷疑義輒咨訪之出補豫章太守大設庠序起學臺功用彌廣刺史王凝之上言抵罪免官歸家遠公招之入社而寧竟不能往龍眠李伯時為余作蓮社十八賢圖追寫當時事按十八賢行狀沙門慧遠初為儒因聽道安講般若經豁然大悟乃與其弟慧持俱棄儒落髮太元中至盧山時沙門慧永先居香谷遠欲駐錫是山一夕山神見夢稽首留師忽于後夜雷電大震平旦地皆坦夷材木委積江州刺史桓伊表奏其異為師建寺是為東林因號其殿為神運時有彭城遺民劉程之豫章雷次宗鴈門周續之南陽宗炳張詮張野凡六人皆名重一時棄官捨緣來依遠師復有沙門道昺曇恆惠睿曇詵道敬道生曇順凡七人又有梵僧佛䭾跋陀羅佛䭾邪舍二尊者相結為社號廬山十八賢時陳郡謝靈運以才自負少所推與及來社中見遠師心悅誠服乃為開池種白蓮求預淨社遠師以其心亂拒而不納陶潛時棄官居栗里每來社中或時才至便攢眉回去遠師愛之欲留不可得道士陸修靜居簡寂觀亦常來社中與遠相善遠自居東林足不越虎溪一日送陸道士忽行過溪相持而笑又嘗令人沽酒引淵明來故詩人有愛陶長官醉兀兀送陸道士行遲遲沽酒過溪俱破戒彼何人斯師如斯又云陶令醉多招不得謝公心亂去還來者皆其事也此圖初為人路與清流激湍縈帶曲折踰石橋溪回路轉石巖一又繚而上石巖一二巖之間有方石池種白蓮花嵓之傍有石梯度山迤邐而去不知所窮當圖窮處橫為長雲蔽覆樹腰巖頂其高深遠近蓋莫得而見也傍石池有高崖懸泉下瀦為潭支流貫池下注大溪激石而湍浪者虎溪也嵓之外遊行而來者二人一人登嶺出半身者宗昺也一人躡石磴而下者曇順也嵓中經筵會講者四人一人踞床憑几揮麈而講說者道生也一人持羽扇目注懸猿而意在深聽者雷次宗也一人合掌坐于床下者道敬也一人相向而坐者曇詵也一人執經卷跪聽于其後童子一舒足搔首有倦聽之意蓮池之上繯石臺坐而箋經校義者五人石上列香爐筆硯之具一人憑石而坐者劉程之也一人手開經軸倚石而回視者張詮也一人正坐俯而閲經者惠睿也一人回坐拱手傍視而沉思者惠持也一人持如意而指經者惠永也一人捧經笈與童子持如意立其後又童子跪而司火持鋏向爐而吹一人俯爐而方烹一人捧茶盤而立傍有石置茶器又一巖中有文殊金像繯坐其下為佛事者三人一人執爐跪而歌唄者曇恆也一人坐而擎拳者道昺也一人執經卷而坐者周續之也臨溪偶坐者二人皆梵僧一人袒肩持短錫者跋陀羅也一人舉如意據膝而坐者耶舍也童子一卷髮胡面持羽扇立其後一人露頂坦腹仰視懸泉坐而濯足者張野也童子持巾立其側又蹲而汲者一人石橋之傍峭壁崛起前有僧與道士相促而笑者遠公送陸道士過虎溪也一人貌怪雄視捉巾瓶而立者捕蛇翁也童子負杖却立而待一人乘籃輿者淵明之回去也淵明有足疾嘗以竹籃為輿其子與門生肩之前者若欲憩而不得後者若甘負而忘倦蓋門人與其子也童子負酒瓢從之一人持貝葉騎而方來者謝靈運也傍一人持曲笠童子負笈前騎而行凡為人三十有八馬一猿一鹿一器用草木不復以數計人物灑落泉石秀潤追千載于筆下萃群賢于掌中開圖恍然若與之接揮麈而談者如欲懸河吐屑肆辨而未停默坐而聽者如欲屏息社意審諦而冥冥沉思者如欲鈎深味遠叩玄關宅靈府而遊乎恍惚之庭梵唄者如欲轉喉鼓舌而有雲雷之響與海潮之聲行往來者如御風而遐舉坐臨水者如騎鯨而將去笑執手者軒渠絶倒達于衣冠蓋其心手相忘筆與神會而妙出意表故能奴隸𮨇陸童僕張吳跨千載而獨步非十八人者不足以發伯時之筆非伯時者不足以寫十八人之趣豈非泉石膏肓煙霞錮疾其臭相似故形容之工若同時而共處者也伯時與余為從兄實山林莫逆之友為此圖凡三十八日而成余得之遊居𥨊其下客來觀者或未知蓮社事因記其後覽者當自得之也圖成于元豐庚申十二月二十五日越明年辛酉正月二十六日龍眠李冲元元中記右蓮社高賢傳一卷本不著作者姓名自隋唐志朝陳二家俱未見書曰原跋謂自昔出於廬山宋熙寧間嘉禾賢良陳舜俞粗加刊正大觀初沙門懷悟復為詳補而是書始顯然此十八高賢皆晉宋時人則此傳亦當為晉宋時書故仍從唐宋叢書釆補其曰蓮社者謂謝靈運在廬山鑿池種白蓮時遠公諸賢同修淨土之業因號白蓮社靈運嘗求入社遠公以其心雜而止之夫既不許其人入社而又取其人所種之蓮以名社則人之稱斯社也其謂之何但如遠公始欲從學范寧卒乃傳經雷次宗周續之以一釋和尚而能為功經學前此所未有也白香山為劉軻代書謂廬山自陶謝洎十八賢以來儒風綿綿不絶而皆由遠公倡之今録其書又豈獨為釋氏提振宗風耶汝上王謨識
